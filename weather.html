<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Weather</title>
  <meta name="theme-color" id="theme-color-meta" content="#1a6fd4">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Weather">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
    /* ── Reset & Base ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS Custom Properties ───────────────────────────────────────────── */
    :root {
      --font: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      --card-radius: 16px;
      --glass-bg: rgba(0, 0, 0, 0.25);
      --glass-border: rgba(255, 255, 255, 0.35);
      --glass-blur: blur(20px);
      --text-primary: rgba(255, 255, 255, 1.0);
      --text-secondary: rgba(255, 255, 255, 0.90);
      --text-muted: rgba(255, 255, 255, 0.70);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    /* ── Gradient Themes ─────────────────────────────────────────────────── */
    body { transition: background 0.6s ease; }
    body.theme-clear-day      { background: linear-gradient(175deg, #1a6fd4 0%, #3b8fde 40%, #5ba3e0 100%); }
    body.theme-clear-night    { background: linear-gradient(175deg, #0d1b3e 0%, #1a2f5e 50%, #2d3f7a 100%); }
    body.theme-cloudy         { background: linear-gradient(175deg, #4a6580 0%, #6a849a 50%, #8a9fb5 100%); }
    body.theme-fog            { background: linear-gradient(175deg, #6b7b8d 0%, #8a9baa 50%, #a5b4c0 100%); }
    body.theme-drizzle        { background: linear-gradient(175deg, #3a5068 0%, #4d657a 50%, #607a8e 100%); }
    body.theme-rain           { background: linear-gradient(175deg, #2c3e50 0%, #3d5166 50%, #4e6578 100%); }
    body.theme-snow           { background: linear-gradient(175deg, #6b8ea8 0%, #8daec5 50%, #a8c8dc 100%); }
    body.theme-thunderstorm   { background: linear-gradient(175deg, #1a1a2e 0%, #2d2d44 50%, #3d3d5c 100%); }

    /* ── Light theme overrides (dark text for truly light backgrounds) ──── */
    body.theme-fog,
    body.theme-snow {
      color: rgba(0, 0, 0, 0.88);
      --text-primary:   rgba(0, 0, 0, 0.88);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted:     rgba(0, 0, 0, 0.50);
      --glass-bg:       rgba(255, 255, 255, 0.30);
      --glass-border:   rgba(0, 0, 0, 0.12);
      --shadow:         0 8px 32px rgba(0, 0, 0, 0.18);
    }

    body.theme-fog .hero-state,  body.theme-snow .hero-state,
    body.theme-fog .hero-cond,   body.theme-snow .hero-cond,
    body.theme-fog .hero-hl,     body.theme-snow .hero-hl,
    body.theme-fog .hourly-time, body.theme-snow .hourly-time,
    body.theme-fog .daily-lo,    body.theme-snow .daily-lo,
    body.theme-fog .tile-label,  body.theme-snow .tile-label,
    body.theme-fog .tile-sub,    body.theme-snow .tile-sub {
      color: rgba(0, 0, 0, 0.60);
    }

    body.theme-fog .search-input::placeholder,
    body.theme-snow .search-input::placeholder {
      color: rgba(0, 0, 0, 0.45);
    }

    /* ── Body / App Shell ────────────────────────────────────────────────── */
    body {
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app-outer {
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      padding-bottom: 40px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Frosted Glass Utility ───────────────────────────────────────────── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow);
    }

    /* ── Search Bar ──────────────────────────────────────────────────────── */
    .search-wrap {
      padding: 56px 16px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .search-field {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
    }

    .search-icon { font-size: 16px; opacity: 0.7; flex-shrink: 0; }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 17px;
      font-family: var(--font);
      color: var(--text-primary);
      min-width: 0;
    }
    .search-input::placeholder { color: rgba(255, 255, 255, 0.55); }

    /* ── Loading Spinner ─────────────────────────────────────────────────── */
    #spinner {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 60px 0;
    }
    .spin-ring {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error Message ───────────────────────────────────────────────────── */
    #error-msg {
      display: none;
      margin: 0 16px;
      padding: 14px 16px;
      border-radius: var(--card-radius);
      background: rgba(255, 60, 60, 0.25);
      border: 1px solid rgba(255, 80, 80, 0.4);
      font-size: 15px;
      color: var(--text-primary);
      text-align: center;
    }

    /* ── Hero Section ────────────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 24px 16px 8px;
    }
    .hero-city  { font-size: 32px; font-weight: 300; letter-spacing: -0.5px; text-shadow: 0 1px 6px rgba(0,0,0,0.35); }
    .hero-state { font-size: 17px; color: var(--text-secondary); margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .hero-temp  { font-size: 96px; font-weight: 200; letter-spacing: -4px; line-height: 1; margin: 6px 0 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.35); }
    .hero-cond  { font-size: 20px; color: var(--text-secondary); text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .hero-hl    { font-size: 17px; color: var(--text-secondary); margin-top: 4px; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }

    /* ── Hourly Strip ────────────────────────────────────────────────────── */
    .hourly-wrap {
      margin: 0 16px;
      padding: 14px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .hourly-wrap::-webkit-scrollbar { display: none; }

    .hourly-row {
      display: flex;
      gap: 20px;
      min-width: max-content;
    }

    .hourly-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 44px;
    }
    .hourly-time { font-size: 13px; color: var(--text-secondary); }
    .hourly-icon { font-size: 22px; }
    .hourly-temp { font-size: 15px; font-weight: 500; }

    /* ── Daily Forecast ──────────────────────────────────────────────────── */
    .daily-wrap { margin: 0 16px; }

    .daily-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .daily-item:last-child { border-bottom: none; }

    .daily-day  { font-size: 17px; font-weight: 400; width: 52px; flex-shrink: 0; }
    .daily-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
    .daily-lo   { font-size: 17px; color: var(--text-muted); width: 34px; text-align: right; flex-shrink: 0; }
    .daily-bar-wrap {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      position: relative;
      min-width: 0;
    }
    .daily-bar-fill {
      position: absolute;
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #4dcaff, #ffd700);
    }
    .daily-hi { font-size: 17px; width: 34px; text-align: left; flex-shrink: 0; }

    /* ── Detail Tiles ────────────────────────────────────────────────────── */
    .tiles-grid {
      margin: 0 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tile {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 110px;
    }
    .tile-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .tile-value { font-size: 28px; font-weight: 300; line-height: 1.1; }
    .tile-value small { font-size: 16px; }
    .tile-sub   { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* UV Bar */
    .uv-bar {
      position: relative;
      height: 4px;
      border-radius: 2px;
      margin-top: 8px;
      background: linear-gradient(90deg, #4caf50, #ffeb3b, #ff9800, #f44336, #9c27b0);
      overflow: visible;
    }
    .uv-needle {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(0,0,0,0.4);
    }

    /* Humidity Arc */
    .humidity-arc {
      margin-top: 6px;
      overflow: visible;
    }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (min-width: 440px) {
      body { padding: 0 0 40px; }
      .app-outer { border-radius: 24px; margin: 20px 0; min-height: auto; }
    }
  </style>
</head>
<body class="theme-clear-day">
  <div class="app-outer">

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-field glass">
        <span class="search-icon">🔍</span>
        <input id="zip-input" class="search-input" type="text"
          inputmode="numeric" maxlength="100" placeholder="Search city or zip code…"
          autocomplete="off" spellcheck="false">
      </div>
    </div>

    <!-- Loading -->
    <div id="spinner">
      <div class="spin-ring"></div>
    </div>

    <!-- Error -->
    <div id="error-msg"></div>

    <!-- Main content (hidden until data loads) -->
    <div id="app-shell" style="display:none; flex-direction:column; gap:12px;">

      <!-- Hero -->
      <div class="hero">
        <div id="hero-city"  class="hero-city"></div>
        <div id="hero-state" class="hero-state"></div>
        <div id="hero-temp"  class="hero-temp"></div>
        <div id="hero-cond"  class="hero-cond"></div>
        <div id="hero-hl"    class="hero-hl"></div>
      </div>

      <!-- Hourly -->
      <div class="hourly-wrap glass">
        <div id="hourly-row" class="hourly-row"></div>
      </div>

      <!-- Daily -->
      <div id="daily-list" class="daily-wrap glass"></div>

      <!-- Detail Tiles -->
      <div id="tiles-grid" class="tiles-grid"></div>

    </div><!-- /app-shell -->

  </div><!-- /app-outer -->

  <script>
    // ── Constants & WMO Map ─────────────────────────────────────────────────
    const WMO_MAP = {
      0:  { label: 'Clear',           icon: '☀️',  theme: 'clear'       },
      1:  { label: 'Mainly Clear',    icon: '🌤️',  theme: 'clear'       },
      2:  { label: 'Partly Cloudy',   icon: '⛅',  theme: 'cloudy'      },
      3:  { label: 'Overcast',        icon: '☁️',  theme: 'cloudy'      },
      45: { label: 'Foggy',           icon: '🌫️',  theme: 'fog'         },
      48: { label: 'Icy Fog',         icon: '🌫️',  theme: 'fog'         },
      51: { label: 'Light Drizzle',   icon: '🌦️',  theme: 'drizzle'     },
      53: { label: 'Drizzle',         icon: '🌦️',  theme: 'drizzle'     },
      55: { label: 'Heavy Drizzle',   icon: '🌧️',  theme: 'drizzle'     },
      61: { label: 'Light Rain',      icon: '🌧️',  theme: 'rain'        },
      63: { label: 'Rain',            icon: '🌧️',  theme: 'rain'        },
      65: { label: 'Heavy Rain',      icon: '🌧️',  theme: 'rain'        },
      71: { label: 'Light Snow',      icon: '🌨️',  theme: 'snow'        },
      73: { label: 'Snow',            icon: '❄️',  theme: 'snow'        },
      75: { label: 'Heavy Snow',      icon: '❄️',  theme: 'snow'        },
      77: { label: 'Snow Grains',     icon: '🌨️',  theme: 'snow'        },
      80: { label: 'Showers',         icon: '🌦️',  theme: 'rain'        },
      81: { label: 'Rain Showers',    icon: '🌧️',  theme: 'rain'        },
      82: { label: 'Heavy Showers',   icon: '⛈️',  theme: 'rain'        },
      85: { label: 'Snow Showers',    icon: '🌨️',  theme: 'snow'        },
      86: { label: 'Heavy Snow Showers', icon: '❄️', theme: 'snow'      },
      95: { label: 'Thunderstorm',    icon: '⛈️',  theme: 'thunderstorm'},
      96: { label: 'Thunderstorm',    icon: '⛈️',  theme: 'thunderstorm'},
      99: { label: 'Severe Thunderstorm', icon: '⛈️', theme: 'thunderstorm'},
    };

    // ── State ───────────────────────────────────────────────────────────────
    const state = {
      zip: '',
      cityName: '',
      stateName: '',
      lat: null,
      lon: null,
      weather: null,
      projHighs: [],
    };

    // ── API Fetch Functions ─────────────────────────────────────────────────
    async function fetchLocationByZip(zip) {
      const res = await fetch(`https://api.zippopotam.us/us/${zip}`);
      if (!res.ok) throw new Error(`Zip code "${zip}" not found.`);
      const data = await res.json();
      const place = data.places[0];
      return {
        cityName:  place['place name'],
        stateName: place['state abbreviation'],
        lat: parseFloat(place.latitude),
        lon: parseFloat(place.longitude),
      };
    }

    async function fetchLocationByCity(query) {
      const params = new URLSearchParams({ name: query, count: 5, language: 'en', format: 'json' });
      const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?${params}`);
      if (!res.ok) throw new Error('Geocoding service unavailable. Please try again.');
      const data = await res.json();
      if (!data.results || data.results.length === 0) throw new Error(`No location found for "${query}".`);
      // Prefer US results, otherwise take the first result
      const result = data.results.find(r => r.country_code === 'US') || data.results[0];
      const isUS   = result.country_code === 'US';
      return {
        cityName:  result.name,
        stateName: isUS ? (result.admin1_code || result.admin1 || result.country) : result.country,
        lat: result.latitude,
        lon: result.longitude,
      };
    }

    async function fetchWeather(lat, lon) {
      const params = new URLSearchParams({
        latitude:  lat,
        longitude: lon,
        hourly: [
          'temperature_2m', 'apparent_temperature', 'relative_humidity_2m',
          'weather_code', 'wind_speed_10m', 'wind_direction_10m',
          'precipitation_probability', 'uv_index',
        ].join(','),
        daily: [
          'temperature_2m_max', 'temperature_2m_min', 'weather_code',
          'sunrise', 'sunset', 'precipitation_sum', 'uv_index_max',
        ].join(','),
        timezone:          'auto',
        temperature_unit:  'fahrenheit',
        wind_speed_unit:   'mph',
        precipitation_unit:'inch',
        forecast_days:     7,
      });
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!res.ok) throw new Error('Weather service unavailable. Please try again.');
      return res.json();
    }

    async function loadWeather(query) {
      showLoading(true);
      clearError();
      try {
        const isZip = /^\d{5}$/.test(query);
        const loc   = isZip ? await fetchLocationByZip(query) : await fetchLocationByCity(query);
        Object.assign(state, loc);
        state.weather = await fetchWeather(loc.lat, loc.lon);
        state.projHighs = calcAll1016Highs(
          state.weather.hourly.time,
          state.weather.hourly.temperature_2m,
          state.weather.daily.time
        );
        render();
      } catch (err) {
        showError(err.message);
      } finally {
        showLoading(false);
      }
    }

    // ── Time & Timezone Helpers ─────────────────────────────────────────────
    function getCurrentHourIndex() {
      const tz = state.weather.timezone;
      const fmt = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz,
        year:  'numeric',
        month: '2-digit',
        day:   '2-digit',
        hour:  '2-digit',
        hour12: false,
      });
      const parts  = fmt.formatToParts(new Date());
      const get    = type => parts.find(p => p.type === type).value;
      const rawHour = get('hour');
      const hour    = rawHour === '24' ? '00' : rawHour;
      const target  = `${get('year')}-${get('month')}-${get('day')}T${hour}:00`;
      const idx     = state.weather.hourly.time.indexOf(target);
      return idx >= 0 ? idx : 0;
    }

    function isNightTime() {
      const w   = state.weather;
      const idx = getCurrentHourIndex();
      const now = w.hourly.time[idx];
      return now < w.daily.sunrise[0] || now > w.daily.sunset[0];
    }

    function formatHour(hour) {
      if (hour === 0)  return '12AM';
      if (hour === 12) return '12PM';
      return hour < 12 ? `${hour}AM` : `${hour - 12}PM`;
    }

    function getDayName(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { weekday: 'short' });
    }

    // ── 10AM–4PM Highs (all forecast days) ─────────────────────────────────
    function calcAll1016Highs(hourlyTimes, hourlyTemps, dailyDates) {
      const map = {};
      for (let i = 0; i < hourlyTimes.length; i++) {
        const t    = hourlyTimes[i];
        const date = t.slice(0, 10);
        const hour = parseInt(t.slice(11, 13), 10);
        if (hour >= 10 && hour <= 16) {
          if (map[date] === undefined || hourlyTemps[i] > map[date]) {
            map[date] = hourlyTemps[i];
          }
        }
      }
      return dailyDates.map(d => map[d] !== undefined ? Math.round(map[d]) : null);
    }

    // ── Render Functions ────────────────────────────────────────────────────
    function render() {
      const w   = state.weather;
      const idx = getCurrentHourIndex();
      const code     = w.hourly.weather_code[idx] ?? 0;
      const wmoEntry = WMO_MAP[code] || WMO_MAP[0];

      applyTheme(wmoEntry.theme);
      renderHero(w, idx, wmoEntry);
      renderHourly(w, idx);
      renderDaily(w);
      renderTiles(w, idx);

      const shell = document.getElementById('app-shell');
      shell.style.display = 'flex';
    }

    const THEME_COLORS = {
      'clear-day':   '#1a6fd4', 'clear-night': '#0d1b3e',
      'cloudy':      '#4a6580', 'fog':         '#6b7b8d',
      'drizzle':     '#3a5068', 'rain':        '#2c3e50',
      'snow':        '#6b8ea8', 'thunderstorm':'#1a1a2e',
    };

    function applyTheme(theme) {
      const night = isNightTime();
      const key   = (night && theme === 'clear') ? 'clear-night' : theme;
      document.body.className = 'theme-' + key;
      document.getElementById('theme-color-meta').content = THEME_COLORS[key] || '#1a6fd4';
    }

    function renderHero(w, idx, wmoEntry) {
      const currentTemp = Math.round(w.hourly.temperature_2m[idx]);
      const todayLow    = Math.round(w.daily.temperature_2m_min[0]);
      const highDisplay = state.projHighs[0] !== null
        ? state.projHighs[0]
        : Math.round(w.daily.temperature_2m_max[0]);

      document.getElementById('hero-city').textContent  = state.cityName;
      document.getElementById('hero-state').textContent = state.stateName;
      document.getElementById('hero-temp').textContent  = currentTemp + '°';
      document.getElementById('hero-cond').textContent  = wmoEntry.label;
      document.getElementById('hero-hl').textContent    = `H:${highDisplay}°   L:${todayLow}°`;
    }

    function renderHourly(w, startIdx) {
      const endIdx = Math.min(startIdx + 25, w.hourly.time.length);
      const row    = document.getElementById('hourly-row');
      row.innerHTML = '';

      for (let i = startIdx; i < endIdx; i++) {
        const timeStr = w.hourly.time[i];
        const hour    = parseInt(timeStr.slice(11, 13), 10);
        const temp    = Math.round(w.hourly.temperature_2m[i]);
        const code    = w.hourly.weather_code[i] ?? 0;
        const wmo     = WMO_MAP[code] || WMO_MAP[0];
        const label   = (i === startIdx) ? 'Now' : formatHour(hour);

        row.insertAdjacentHTML('beforeend', `
          <div class="hourly-item">
            <span class="hourly-time">${label}</span>
            <span class="hourly-icon">${wmo.icon}</span>
            <span class="hourly-temp">${temp}°</span>
          </div>
        `);
      }
    }

    function renderDaily(w) {
      const highs  = w.daily.temperature_2m_max;
      const lows   = w.daily.temperature_2m_min;
      const codes  = w.daily.weather_code;
      const times  = w.daily.time;

      const globalMin   = Math.min(...lows);
      const globalMax   = Math.max(...highs);
      const globalRange = globalMax - globalMin || 1;

      const list = document.getElementById('daily-list');
      list.innerHTML = '';

      times.forEach((dateStr, i) => {
        const high = Math.round(highs[i]);
        const low  = Math.round(lows[i]);
        const wmo  = WMO_MAP[codes[i]] || WMO_MAP[0];

        const displayHigh = state.projHighs[i] !== null
          ? state.projHighs[i]
          : high;

        const dayLabel  = i === 0 ? 'Today' : getDayName(dateStr);
        const leftPct   = ((low  - globalMin) / globalRange * 100).toFixed(1);
        const widthPct  = Math.max((high - low) / globalRange * 100, 5).toFixed(1);

        list.insertAdjacentHTML('beforeend', `
          <div class="daily-item">
            <span class="daily-day">${dayLabel}</span>
            <span class="daily-icon">${wmo.icon}</span>
            <span class="daily-lo">${low}°</span>
            <div class="daily-bar-wrap">
              <div class="daily-bar-fill" style="left:${leftPct}%;width:${widthPct}%"></div>
            </div>
            <span class="daily-hi">${displayHigh}°</span>
          </div>
        `);
      });
    }

    function renderTiles(w, idx) {
      const uv        = w.hourly.uv_index[idx] ?? 0;
      const wind      = Math.round(w.hourly.wind_speed_10m[idx] ?? 0);
      const windDir   = getWindDir(w.hourly.wind_direction_10m[idx] ?? 0);
      const humid     = Math.round(w.hourly.relative_humidity_2m[idx] ?? 0);
      const feels     = Math.round(w.hourly.apparent_temperature[idx] ?? 0);
      const precip    = (w.daily.precipitation_sum[0] ?? 0).toFixed(2);
      const precipPct = Math.max(...w.hourly.precipitation_probability
        .slice(idx, idx + 24)
        .filter(v => v != null), 0);

      const uvRounded = Math.round(uv);
      const uvPct     = Math.min((uv / 11) * 100, 100).toFixed(0);
      const uvLabel   = uv <= 2 ? 'Low' : uv <= 5 ? 'Moderate' : uv <= 7 ? 'High' : uv <= 10 ? 'Very High' : 'Extreme';

      const actualTemp = Math.round(w.hourly.temperature_2m[idx] ?? feels);
      const feelsDiff  = feels - actualTemp;
      const feelsDesc  = Math.abs(feelsDiff) <= 2 ? 'Similar to actual' :
                         feelsDiff < 0 ? 'Feels colder' : 'Feels warmer';

      const r        = 28;
      const halfCirc = Math.PI * r;
      const arcFill  = (humid / 100) * halfCirc;

      document.getElementById('tiles-grid').innerHTML = `
        <div class="tile glass">
          <span class="tile-label">UV Index</span>
          <span class="tile-value">${uvRounded}</span>
          <span class="tile-sub">${uvLabel}</span>
          <div class="uv-bar" style="margin-top:auto;">
            <div class="uv-needle" style="left:${uvPct}%"></div>
          </div>
        </div>

        <div class="tile glass">
          <span class="tile-label">Wind</span>
          <span class="tile-value">${wind}<small> mph</small></span>
          <span class="tile-sub">${windDir}</span>
        </div>

        <div class="tile glass">
          <span class="tile-label">Humidity</span>
          <span class="tile-value">${humid}%</span>
          <svg class="humidity-arc" viewBox="0 0 80 44" width="80" height="44">
            <path d="M12,40 A28,28 0 0,1 68,40" fill="none"
              stroke="rgba(255,255,255,0.2)" stroke-width="5" stroke-linecap="round"/>
            <path d="M12,40 A28,28 0 0,1 68,40" fill="none"
              stroke="white" stroke-width="5" stroke-linecap="round"
              stroke-dasharray="${arcFill.toFixed(1)} ${halfCirc.toFixed(1)}"
              pathLength="${halfCirc.toFixed(1)}"/>
          </svg>
        </div>

        <div class="tile glass">
          <span class="tile-label">Feels Like</span>
          <span class="tile-value">${feels}°</span>
          <span class="tile-sub">${feelsDesc}</span>
        </div>

        <div class="tile glass">
          <span class="tile-label">Precipitation</span>
          <span class="tile-value">${precip}<small> in</small></span>
          <span class="tile-sub">Today's total</span>
        </div>

        <div class="tile glass">
          <span class="tile-label">Chance of Rain</span>
          <span class="tile-value">${precipPct}%</span>
          <span class="tile-sub">Next 24 hours</span>
        </div>
      `;
    }

    function getWindDir(deg) {
      const dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      return dirs[Math.round(deg / 45) % 8];
    }

    // ── UI State Helpers ────────────────────────────────────────────────────
    function showLoading(on) {
      document.getElementById('spinner').style.display = on ? 'flex' : 'none';
      if (on) document.getElementById('app-shell').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function clearError() {
      const el = document.getElementById('error-msg');
      el.textContent = '';
      el.style.display = 'none';
    }

    function handleSearch(query) {
      const clean = query.trim();
      if (!clean) return;
      loadWeather(clean);
    }

    // ── Bootstrap ───────────────────────────────────────────────────────────
    document.getElementById('zip-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSearch(e.target.value);
    });

    // ── PWA: Service Worker ─────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    // ── PWA: Apple Touch Icon (generated via canvas) ────────────────────────
    (function () {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
        <rect width="180" height="180" rx="40" fill="#1a6fd4"/>
        <text x="90" y="128" font-size="96" text-anchor="middle"
          font-family="Apple Color Emoji,Segoe UI Emoji,sans-serif">⛅</text>
      </svg>`;
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url  = URL.createObjectURL(blob);
      const img  = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 180;
        canvas.getContext('2d').drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        const link = document.createElement('link');
        link.rel  = 'apple-touch-icon';
        link.href = canvas.toDataURL('image/png');
        document.head.appendChild(link);
      };
      img.src = url;
    })();
  </script>
</body>
</html>
