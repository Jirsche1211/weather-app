        fill="#FFFFFF"
        letter-spacing="-6">MPG</text>
  <!-- Subtle tagline -->
  <text x="256" y="400"
        font-size="22"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="500"
        text-anchor="middle"
        fill="rgba(255,255,255,0.40)"
