<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0D1F3C"/>
  <!-- Background subtle pattern -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg-pattern)" opacity="0.04"/>
  <!-- Accent bar -->
  <rect x="96" y="342" width="320" height="22" rx="11" fill="#1D6FEB"/>
  <!-- MPG wordmark -->
  <text x="256" y="312"
        font-size="156"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="800"
